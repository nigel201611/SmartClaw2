<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Robot Body -->
  <rect x="156" y="200" width="200" height="180" rx="20" fill="url(#robotGrad)"/>
  
  <!-- Robot Head -->
  <rect x="176" y="120" width="160" height="120" rx="15" fill="url(#robotGrad)"/>
  
  <!-- Eyes -->
  <circle cx="216" cy="170" r="18" fill="#e94560"/>
  <circle cx="296" cy="170" r="18" fill="#e94560"/>
  <circle cx="220" cy="166" r="6" fill="#ffffff"/>
  <circle cx="300" cy="166" r="6" fill="#ffffff"/>
  
  <!-- Antenna -->
  <rect x="252" y="80" width="8" height="50" fill="#e0e0e0"/>
  <circle cx="256" cy="70" r="15" fill="#e94560"/>
  <circle cx="256" cy="66" r="5" fill="#ffffff" opacity="0.6"/>
  
  <!-- Mouth -->
  <rect x="206" y="200" width="100" height="12" rx="6" fill="#0f3460"/>
  
  <!-- Body Details -->
  <rect x="196" y="240" width="120" height="60" rx="10" fill="#0f3460" opacity="0.3"/>
  <circle cx="236" cy="270" r="8" fill="#e94560"/>
  <circle cx="276" cy="270" r="8" fill="#4ade80"/>
  
  <!-- Arms -->
  <rect x="120" y="220" width="40" height="100" rx="20" fill="url(#robotGrad)"/>
  <rect x="352" y="220" width="40" height="100" rx="20" fill="url(#robotGrad)"/>
  
  <!-- Shine effect -->
  <ellipse cx="180" cy="150" rx="30" ry="20" fill="#ffffff" opacity="0.2"/>
</svg>
