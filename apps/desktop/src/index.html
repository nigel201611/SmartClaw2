<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'">
  <title>SmartClaw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee;
      height: 100vh; display: flex; flex-direction: column;
    }
    .header { background: #16213e; padding: 1rem; text-align: center; border-bottom: 1px solid #0f3460; }
    .header h1 { font-size: 1.5rem; color: #e94560; }
    .chat-container { flex: 1; display: flex; flex-direction: column; padding: 1rem; overflow: hidden; }
    .messages { flex: 1; overflow-y: auto; margin-bottom: 1rem; }
    .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; max-width: 80%; }
    .message.user { background: #0f3460; margin-left: auto; }
    .message.assistant { background: #16213e; }
    .input-area { display: flex; gap: 0.5rem; }
    .input-area input { flex: 1; padding: 0.75rem 1rem; border: none; border-radius: 8px; background: #16213e; color: #eee; font-size: 1rem; }
    .input-area input:focus { outline: 2px solid #e94560; }
    .input-area button { padding: 0.75rem 1.5rem; background: #e94560; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .input-area button:hover { background: #ff6b6b; }
    .welcome { text-align: center; padding: 3rem; color: #888; }
    .welcome h2 { color: #e94560; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <header class="header"><h1>🤖 SmartClaw</h1></header>
  <main class="chat-container">
    <div class="messages" id="messages">
      <div class="welcome"><h2>Welcome to SmartClaw!</h2><p>Your AI-powered desktop chatbot assistant</p></div>
    </div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type your message..." />
      <button id="sendBtn">Send</button>
    </div>
  </main>
  <script src="renderer.js"></script>
</body>
</html>
