<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartClaw - 启动中</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: white;
        overflow: hidden;
      }

      .container {
        text-align: center;
        padding: 40px;
        width: 100%;
        max-width: 500px;
      }

      .logo {
        font-size: 64px;
        font-weight: bold;
        margin-bottom: 20px;
        animation: fadeIn 0.5s ease;
      }

      .logo-icon {
        font-size: 80px;
        margin-bottom: 10px;
        display: inline-block;
        animation: pulse 2s ease-in-out infinite;
      }

      .title {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: 1px;
      }

      .subtitle {
        font-size: 14px;
        opacity: 0.7;
        margin-bottom: 30px;
      }

      .status-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        padding: 24px;
        margin: 20px 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
      }

      .status {
        font-size: 18px;
        margin-bottom: 20px;
        font-weight: 500;
      }

      .status-icon {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background-color: #ffc107;
        margin-right: 10px;
        animation: blink 1.5s ease-in-out infinite;
      }

      .status-icon.success {
        background-color: #4caf50;
        animation: none;
      }

      .status-icon.warning {
        background-color: #ff9800;
        animation: none;
      }

      .status-icon.error {
        background-color: #f44336;
        animation: none;
      }

      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 3px;
        overflow: hidden;
        margin: 20px 0;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #4caf50, #8bc34a);
        border-radius: 3px;
        transition: width 0.3s ease;
      }

      .message {
        font-size: 13px;
        opacity: 0.8;
        margin-top: 15px;
        word-break: break-word;
      }

      .detail {
        font-size: 11px;
        opacity: 0.6;
        margin-top: 8px;
        font-family: monospace;
      }

      .docker-status {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 12px;
        padding: 16px;
        margin-top: 20px;
        font-size: 12px;
        text-align: left;
        transition: all 0.3s ease;
      }

      .docker-status-item {
        display: flex;
        justify-content: space-between;
        margin: 8px 0;
        padding: 4px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .docker-status-label {
        font-weight: 500;
        opacity: 0.8;
      }

      .docker-status-value {
        font-family: monospace;
      }

      .docker-status-value.success {
        color: #4caf50;
      }

      .docker-status-value.warning {
        color: #ff9800;
      }

      .docker-status-value.error {
        color: #f44336;
      }

      .button {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 15px;
        transition: all 0.3s ease;
      }

      .button:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateY(-1px);
      }

      .auto-close {
        animation: fadeOut 0.5s ease forwards;
        pointer-events: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: scale(1);
        }
        to {
          opacity: 0;
          transform: scale(0.95);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .hidden {
        display: none;
      }

      .matrix-info {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 11px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <div class="logo-icon">🦞</div>
        <div class="title">SmartClaw</div>
        <div class="subtitle">智能矩阵客户端</div>
      </div>

      <div class="status-card" id="statusCard">
        <div class="status">
          <span class="status-icon" id="statusIcon"></span>
          <span id="statusText">正在初始化...</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="message" id="message">准备启动...</div>
        <div class="detail" id="detail"></div>
        <div class="matrix-info" id="matrixInfo" style="display: none"></div>
      </div>

      <div id="dockerStatusPanel" class="docker-status hidden">
        <div style="font-weight: bold; margin-bottom: 12px">🐳 Docker 状态</div>
        <div class="docker-status-item">
          <span class="docker-status-label">安装状态</span>
          <span class="docker-status-value" id="dockerInstalled">检测中...</span>
        </div>
        <div class="docker-status-item">
          <span class="docker-status-label">运行状态</span>
          <span class="docker-status-value" id="dockerRunning">检测中...</span>
        </div>
        <div class="docker-status-item">
          <span class="docker-status-label">版本信息</span>
          <span class="docker-status-value" id="dockerVersion">-</span>
        </div>
        <button class="button" id="installGuideBtn" style="display: none">📖 查看安装指南</button>
      </div>
    </div>

    <script>
      console.log('Startup page loaded');

      // 状态映射 - 移除了 waiting_login 状态
      const stateMessages = {
        initializing: { text: '正在初始化...', icon: 'blink', message: '准备启动环境' },
        'checking-docker': { text: '检测 Docker 环境...', icon: 'blink', message: '检查 Docker 是否已安装' },
        'starting-containers': { text: '启动 Matrix 容器...', icon: 'blink', message: '正在启动 Matrix 服务' },
        'waiting-healthy': { text: '等待服务就绪...', icon: 'blink', message: 'Matrix 服务启动中，请稍候' },
        'initializing-matrix': { text: '连接 Matrix 服务...', icon: 'blink', message: '正在连接到 Matrix 服务' },
        ready: { text: '启动完成！', icon: 'success', message: '应用已准备就绪' },
        error: { text: '启动失败', icon: 'error', message: '启动过程中遇到错误' },
      };

      const statusIcon = document.getElementById('statusIcon');
      const statusText = document.getElementById('statusText');
      const progressFill = document.getElementById('progressFill');
      const messageEl = document.getElementById('message');
      const detailEl = document.getElementById('detail');
      const matrixInfo = document.getElementById('matrixInfo');
      const statusCard = document.getElementById('statusCard');
      const dockerStatusPanel = document.getElementById('dockerStatusPanel');
      const dockerInstalled = document.getElementById('dockerInstalled');
      const dockerRunning = document.getElementById('dockerRunning');
      const dockerVersion = document.getElementById('dockerVersion');
      const installGuideBtn = document.getElementById('installGuideBtn');

      let autoCloseTimeout = null;

      // 更新启动进度
      function updateProgress(data) {
        console.log('Progress update:', data);

        const progress = data.progress || 0;
        progressFill.style.width = progress + '%';

        if (data.message) {
          messageEl.textContent = data.message;
        }

        if (data.detail) {
          detailEl.textContent = data.detail;
        }

        // 更新状态样式
        const stateInfo = stateMessages[data.state] || stateMessages['initializing'];
        statusText.textContent = stateInfo.text;

        if (data.state === 'ready') {
          statusIcon.className = 'status-icon success';
          messageEl.textContent = stateInfo.message;

          // 启动完成后，延迟关闭启动窗口
          if (autoCloseTimeout) clearTimeout(autoCloseTimeout);
          autoCloseTimeout = setTimeout(() => {
            console.log('Startup complete, closing splash window');
            statusCard.classList.add('auto-close');
            setTimeout(() => {
              if (window.electronAPI && window.electronAPI.closeStartupWindow) {
                window.electronAPI.closeStartupWindow();
              }
            }, 500);
          }, 1500);
        } else if (data.state === 'error') {
          statusIcon.className = 'status-icon error';
        } else if (stateInfo.icon === 'warning') {
          statusIcon.className = 'status-icon warning';
        } else if (stateInfo.icon === 'success') {
          statusIcon.className = 'status-icon success';
        } else {
          statusIcon.className = 'status-icon';
        }
      }

      // 显示 Docker 状态
      function showDockerStatus(status) {
        console.log('Docker status:', status);
        dockerStatusPanel.classList.remove('hidden');

        if (status.installed) {
          dockerInstalled.textContent = '✓ 已安装';
          dockerInstalled.className = 'docker-status-value success';
        } else {
          dockerInstalled.textContent = '✗ 未安装';
          dockerInstalled.className = 'docker-status-value error';
        }

        if (status.running) {
          dockerRunning.textContent = '✓ 运行中';
          dockerRunning.className = 'docker-status-value success';
        } else if (status.installed) {
          dockerRunning.textContent = '⚠ 未运行';
          dockerRunning.className = 'docker-status-value warning';
        } else {
          dockerRunning.textContent = '✗ 未运行';
          dockerRunning.className = 'docker-status-value error';
        }

        if (status.version) {
          dockerVersion.textContent = status.version;
        }

        // 显示安装指南按钮
        if (!status.installed || !status.running) {
          installGuideBtn.style.display = 'block';
          messageEl.textContent = 'Docker 未就绪，请先安装并启动 Docker';
        }
      }

      // 显示 Matrix 状态 - 不再要求登录
      function showMatrixStatus(status) {
        console.log('Matrix status:', status);

        if (status.status === 'connected') {
          matrixInfo.style.display = 'block';
          matrixInfo.innerHTML = `✅ Matrix 服务已连接<br>${status.message || ''}`;
          matrixInfo.style.color = '#4caf50';
        } else if (status.status === 'authenticated') {
          matrixInfo.style.display = 'block';
          matrixInfo.innerHTML = `🔐 已登录: ${status.userId || '用户'}<br>${status.message || ''}`;
          matrixInfo.style.color = '#4caf50';
        } else if (status.status === 'connecting') {
          matrixInfo.style.display = 'block';
          matrixInfo.innerHTML = `🔄 ${status.message || '正在连接 Matrix 服务...'}`;
          matrixInfo.style.color = '#ffc107';
        } else if (status.status === 'disconnected') {
          matrixInfo.style.display = 'block';
          matrixInfo.innerHTML = `⚠️ Matrix 服务未连接<br>请在主界面中登录或检查服务状态`;
          matrixInfo.style.color = '#ff9800';
        } else {
          // 其他状态，不显示额外信息
          matrixInfo.style.display = 'none';
        }
      }

      // 显示错误
      function showError(error) {
        console.error('Startup error:', error);
        statusText.textContent = '启动失败';
        statusIcon.className = 'status-icon error';
        messageEl.textContent = error.message || '发生未知错误';
        if (error.detail) {
          detailEl.textContent = error.detail;
        }
      }

      // 安装指南按钮点击
      installGuideBtn.addEventListener('click', () => {
        if (window.electronAPI && window.electronAPI.openGuide) {
          window.electronAPI.openGuide();
        }
      });

      // 监听来自主进程的事件
      if (window.electronAPI) {
        console.log('Electron API available');

        // 注册启动进度监听
        if (window.electronAPI.onStartupProgress) {
          window.electronAPI.onStartupProgress(updateProgress);
          console.log('onStartupProgress registered');
        } else {
          console.warn('onStartupProgress not available');
        }

        // 注册 Docker 状态监听
        if (window.electronAPI.onDockerStatus) {
          window.electronAPI.onDockerStatus(showDockerStatus);
          console.log('onDockerStatus registered');
        } else {
          console.warn('onDockerStatus not available');
        }

        // 注册 Matrix 状态监听
        if (window.electronAPI.onMatrixStatus) {
          window.electronAPI.onMatrixStatus(showMatrixStatus);
          console.log('onMatrixStatus registered');
        } else {
          console.warn('onMatrixStatus not available');
        }

        // 注册错误监听
        if (window.electronAPI.onStartupError) {
          window.electronAPI.onStartupError(showError);
          console.log('onStartupError registered');
        } else {
          console.warn('onStartupError not available');
        }
      } else {
        console.error('window.electronAPI is not available!');
        messageEl.textContent = '错误：无法连接到应用主进程';
        statusText.textContent = '初始化失败';
        statusIcon.className = 'status-icon error';
      }

      // 请求初始状态
      if (window.electronAPI && window.electronAPI.getStartupState) {
        window.electronAPI
          .getStartupState()
          .then((state) => {
            console.log('Initial state:', state);
            if (state) updateProgress(state);
          })
          .catch((err) => {
            console.error('Failed to get startup state:', err);
          });
      }

      // 页面卸载时清理定时器
      window.addEventListener('beforeunload', () => {
        if (autoCloseTimeout) {
          clearTimeout(autoCloseTimeout);
        }
      });
    </script>
  </body>
</html>
